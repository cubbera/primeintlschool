<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assessment Entry — PRIME International School</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui; background: #f0f2f5; padding: 20px; color: #1d1d1f; }
.page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.page-subtitle { font-size: 13px; color: #666; margin-bottom: 18px; }
.dropdown-label { font-size: 13px; font-weight: 600; }
select { padding: 4px 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px; }
.meta-bar { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 22px; align-items: center; background: #fff; padding: 12px 16px; border-radius: 10px; border: 1px solid #ddd; }
.subject-section { margin-bottom: 22px; }
.subject-header { color: white; padding: 9px 14px; border-radius: 10px 10px 0 0; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.subject-tag { font-size: 11px; background: rgba(255,255,255,0.2); padding: 2px 7px; border-radius: 999px; font-weight: 400; }
.cw-btns { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
.btn-sm { padding: 3px 9px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.12); color: white; cursor: pointer; font-size: 11px; }
.btn-sm:hover { background: rgba(255,255,255,0.28); }
.card { background: #fff; border-radius: 0 0 10px 10px; border: 1px solid #ddd; border-top: none; padding: 12px; }
.table-wrapper { overflow-x: auto; border: 1px solid #c0c0c0; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
th, td { border: 1px solid #c0c0c0; padding: 0; text-align: center; }
th { background: #f3f3f3; font-weight: 600; white-space: nowrap; padding: 5px 8px; border-color: #b0b0b0; font-size: 11px; user-select: none; }
td:first-child { background: #f0f0f0; color: #999; font-size: 11px; width: 28px; min-width: 28px; user-select: none; padding: 3px; }
td.label-col { text-align: left; padding: 0; min-width: 150px; }
.cell-inner { display: block; width: 100%; min-height: 24px; padding: 3px 6px; outline: none; text-align: right; cursor: cell; font-size: 12px; font-family: inherit; }
.cell-inner.name-inner { text-align: left; cursor: default; }
td.selected { outline: 2px solid #1a73e8; outline-offset: -2px; z-index: 2; position: relative; }
td.in-range { background-color: rgba(26,115,232,0.10) !important; }
/* column color groups */
.exam-cell  { background: #fffbea; }
.exam-total-cell { background: #fff0a0; font-weight: 600; }
.cw-cell    { background: #eaf4ff; }
.cw-total-cell { background: #cfe2ff; font-weight: 600; }
.total-cell { background: #eaffea; font-weight: 600; }
.readonly-inner { display: block; width: 100%; min-height: 24px; padding: 3px 6px; text-align: right; font-size: 12px; font-family: inherit; cursor: default; user-select: none; }
.delete-col-btn { font-size: 10px; background: none; border: none; color: #f88; cursor: pointer; margin-left: 2px; }
@keyframes paste-flash { 0%{background:rgba(26,115,232,0.35);} 100%{background:transparent;} }
.paste-flash { animation: paste-flash 0.3s ease-out; }

/* ── SUMMARY: new transposed layout ── */
.summary-section { margin-top: 30px; }
.section-heading { font-size: 17px; font-weight: 700; padding: 10px 16px; border-radius: 10px 10px 0 0; color: white; }
.summary-heading { background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%); }
.summary-card { background: #fff; border-radius: 0 0 10px 10px; border: 1px solid #ddd; border-top: none; padding: 14px; overflow-x: auto; }
.summary-table { border-collapse: collapse; font-size: 12px; }
.summary-table th, .summary-table td { border: 1px solid #b0b0b0; padding: 5px 8px; text-align: center; white-space: nowrap; }
/* student name header row */
.sum-th-student { background: #1d3557; color: white; font-size: 11px; text-align: center; }
/* score-type sub-header under each name */
.sum-th-type { font-size: 10px; font-weight: 600; padding: 3px 5px; white-space: nowrap; }
.sum-th-exam  { background: #fff0a0; color: #555; }
.sum-th-cw    { background: #cfe2ff; color: #555; }
.sum-th-total { background: #b6efb6; color: #222; }
/* subject label column */
.sum-td-subject { text-align: left; font-weight: 700; background: #f5f5f5; min-width: 130px; padding: 5px 10px; }
/* value cells */
.sum-td-exam  { background: #fffbea; }
.sum-td-cw    { background: #eaf4ff; }
.sum-td-total { background: #eaffea; font-weight: 700; }

/* bottom */
.bottom-btns { margin-top: 32px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; padding: 20px; background: #fff; border-radius: 12px; border: 1px solid #ddd; }
.btn-big { padding: 12px 26px; border-radius: 999px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
.btn-big:active { transform: scale(0.97); }
.btn-export { background: #0071e3; color: white; }
.btn-export:hover { background: #005bbd; }
.btn-docs { background: #6f42c1; color: white; }
.btn-docs:hover { background: #5a34a0; }
.btn-submit { background: #b0b0b0; color: #fff; opacity: 0.6; cursor: not-allowed; pointer-events: none; }
.status-msg { margin-top: 12px; font-size: 13px; color: #2d6a4f; font-weight: 600; min-height: 20px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #6f42c1; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="page-title">📋 Assessment Score — Report Card Calculator</div>
<div class="page-subtitle">PRIME International School · All subjects on one page</div>

<div class="meta-bar">
  <span class="dropdown-label">Academic Year:</span>
  <select id="academicYear"><option>2025-2026</option></select>
  <span class="dropdown-label">Term:</span>
  <select id="termSelect"><option>Term 1</option><option>Term 2</option><option>Term 3</option></select>
  <span class="dropdown-label">Class:</span>
  <select id="classSelect" onchange="loadClass()">
    <option value="Y1-A">Y1-A</option>
    <option value="Y2-A">Y2-A</option>
  </select>
</div>

<div id="subjectSections"></div>

<div class="summary-section">
  <div class="section-heading summary-heading">📊 Student Report Summary</div>
  <div class="summary-card" id="summaryContainer"></div>
</div>

<div class="bottom-btns">
  <button class="btn-big btn-export" onclick="exportAllToSheets()">📥 Export All to Sheets</button>
  <button class="btn-big btn-docs" onclick="createAllStudentReports()">📄 Create All Student Reports to Docs</button>
  <button class="btn-big btn-submit" disabled>Submit Scores</button>
</div>
<div class="status-msg" id="statusMsg"></div>

<script>
// ============================================================
// DATA
// ============================================================
const CLASS_STUDENTS = {
  "Y1-A": ["Ye Yint Tayza Hman","Shoon La Woon Htet","Htun Lae Yi Mon","Lwin Aung Hein","Aung Bhone San","Htet Nay Bhone","Sian Vang Huai Kim","Thu Htet Htoo","Khant Su Thar","Lwin Khit","Htut Myat Aung","Myat Shwe Yee Thin","Kaung Khit Han","Linn Pyae Sone Aung","Sai Noon Wan Han","Ngwe Yati Moe","Khant Htet Zen"],
  "Y2-A": ["Zin Aung Hlaing","Phoo Pyae Heather","Shwe Sin Htet Aung","Thoon Thu San Aung","Linn Phone Khit","Khunn Thansin Han","Lin Thiri Hmue","Yuu Mi Khaing Lin","Yoon Htet Htet"]
};
const CLASS_SUBJECTS = {
  "Y1-A": ["English","Mathematics","Science","Social Studies","Myanmar","Wellbeing","ICT","Chinese"],
  "Y2-A": ["English","Mathematics","Science","Social Studies","Myanmar","Myanmar Social Studies","Wellbeing","ICT","Chinese"]
};
// Chinese has quizzes + term exam (no project/presentation coursework section, but has quiz columns)
// We treat it as a special "quiz+exam" subject — NOT pure exam-only anymore
const QUIZ_EXAM_SUBJECTS = ["Chinese"]; // has "Test" (cw-ut) columns + term exam
const SUBJECT_COLORS = {
  "English":"#1d3557","Mathematics":"#8b3a0f","Science":"#1a6b2a","Social Studies":"#7b4f12",
  "Myanmar":"#8b1a4a","Myanmar Social Studies":"#5b2d8e","Wellbeing":"#0e6b6b","ICT":"#1a3d6b","Chinese":"#8b0000"
};

let subjectData = {}, currentClass = "Y1-A";

// ============================================================
// HELPERS
// ============================================================
function SK(s) { return s.replace(/\s+/g,"_").replace(/[^a-zA-Z0-9_]/g,""); }

function colLabel(id) {
  if (id.startsWith("cw-ut"))   return "Unit Test "    + id.replace("cw-ut","");
  if (id.startsWith("cw-test")) return "Test "         + id.replace("cw-test","");
  if (id.startsWith("cw-proj")) return "Project "      + id.replace("cw-proj","");
  if (id.startsWith("cw-pres")) return "Presentation " + id.replace("cw-pres","");
  return id;
}

// Return the prefix group for insertion ordering:
// all unit-tests together, all tests together, all projects together, all presentations together
function prefixGroup(id) {
  if (id.startsWith("cw-ut"))   return "cw-ut";
  if (id.startsWith("cw-test")) return "cw-test";
  if (id.startsWith("cw-proj")) return "cw-proj";
  if (id.startsWith("cw-pres")) return "cw-pres";
  return "other";
}

// ============================================================
// INIT / CLASS LOAD
// ============================================================
function loadClass() {
  currentClass = document.getElementById("classSelect").value;
  subjectData = {};
  CLASS_SUBJECTS[currentClass].forEach(s => {
    const isQuizExam = QUIZ_EXAM_SUBJECTS.includes(s);
    // Chinese starts with one quiz column
    subjectData[s] = { cwColumns: isQuizExam ? ["cw-test1"] : ["cw-ut1"] };
  });
  renderAllSubjects();
  updateSummary();
}

// ============================================================
// RENDER
// ============================================================
function renderAllSubjects() {
  const container = document.getElementById("subjectSections");
  container.innerHTML = "";
  CLASS_SUBJECTS[currentClass].forEach(s => renderSubject(s, container));
  attachSS();
}

function renderSubject(subject, container) {
  const isQuizExam = QUIZ_EXAM_SUBJECTS.includes(subject);
  const sd = subjectData[subject];
  const sk = SK(subject);
  const color = SUBJECT_COLORS[subject] || "#1d3557";
  const students = CLASS_STUDENTS[currentClass];

  const div = document.createElement("div");
  div.className = "subject-section";
  div.id = "sec_"+sk;

  // ── Button bar ──
  let cwBtnsHtml;
  if (isQuizExam) {
    // Chinese: only "+Test" button (no project/presentation)
    cwBtnsHtml = `<div class="cw-btns">
      <button class="btn-sm" onclick="addCW('${subject}','test')">+ Test</button>
    </div>`;
  } else {
    cwBtnsHtml = `<div class="cw-btns">
      <button class="btn-sm" onclick="addCW('${subject}','ut')">+ Unit Test</button>
      <button class="btn-sm" onclick="addCW('${subject}','proj')">+ Project</button>
      <button class="btn-sm" onclick="addCW('${subject}','pres')">+ Presentation</button>
    </div>`;
  }

  // ── Column layout: Exam first, then CW ──
  // Header row 1
  const examHdr = isQuizExam
    ? `<th colspan="2" style="background:#fff0a0;">Term Exam 60%</th>`
    : `<th colspan="2" style="background:#fff0a0;">Term Exam 60%</th>`;
  const cwHdr = `<th id="cwHdr_${sk}" colspan="${sd.cwColumns.length+1}" style="background:#d6ebff;">Coursework 40%</th>`;
  const totalHdr = `<th colspan="2" style="background:#eaffea;">TOTAL (100%)</th>`;

  // Header row 2 — exam sub-cols first
  const examSubCols = `<th data-role="exam-score" style="min-width:78px;">Exam Score</th><th data-role="exam-total" style="min-width:75px;">Exam Total</th>`;

  // CW sub-cols
  const cwSubColsHtml = sd.cwColumns.map(id =>
    `<th id="cwcol_${sk}_${id}" data-role="cw-col" style="min-width:78px;">${colLabel(id)} <button class="delete-col-btn" onclick="delCW('${subject}','${id}')">×</button></th>`
  ).join("") + `<th data-role="cw-total" style="min-width:75px;">CW Total</th>`;

  const totalSubCols = `<th data-role="original-total" style="min-width:68px;">Original</th><th data-role="rounded-total" style="min-width:68px;">Rounded</th>`;

  div.innerHTML = `
    <div class="subject-header" style="background:${color};">
      ${subject} <span class="subject-tag">${isQuizExam ? "Tests + Exam" : "40% CW + 60% Exam"}</span>
      ${cwBtnsHtml}
    </div>
    <div class="card">
      <div class="table-wrapper">
        <table id="tbl_${sk}">
          <thead>
            <tr>
              <th rowspan="2">Nr.</th>
              <th rowspan="2" style="min-width:155px;text-align:left;padding-left:8px;">Student Name</th>
              ${examHdr}${cwHdr}${totalHdr}
            </tr>
            <tr>${examSubCols}${cwSubColsHtml}${totalSubCols}</tr>
          </thead>
          <tbody id="tbody_${sk}"></tbody>
        </table>
      </div>
    </div>`;

  container.appendChild(div);
  const tbody = div.querySelector(`#tbody_${sk}`);
  students.forEach((name, i) => buildRow(tbody, i+1, name, subject));
  recalc(subject);
}

// ── Build one student row ──
// Column order: Nr | Name | ExamScore | ExamTotal | CW... | CWTotal | Original | Rounded
function buildRow(tbody, nr, name, subject) {
  const sd = subjectData[subject];
  const tr = document.createElement("tr");
  tr.setAttribute("data-student", name);

  let html = `<td>${nr}</td><td class="label-col"><div class="cell-inner name-inner" contenteditable="false">${name}</div></td>`;

  // Exam columns first
  html += `<td class="exam-cell exam-score-cell"><div class="cell-inner" contenteditable="true" data-type="number"></div></td>`;
  html += `<td class="exam-total-cell"><span class="readonly-inner">0.00</span></td>`;

  // CW columns
  sd.cwColumns.forEach(id => {
    html += `<td class="cw-cell" data-col="${id}"><div class="cell-inner" contenteditable="true" data-type="number"></div></td>`;
  });
  html += `<td class="cw-total-cell"><span class="readonly-inner">0.00</span></td>`;

  // Total columns
  html += `<td class="total-cell final-total-cell"><span class="readonly-inner">0.00</span></td>`;
  html += `<td class="total-cell rounded-total-cell"><span class="readonly-inner">0</span></td>`;

  tr.innerHTML = html;
  tbody.appendChild(tr);
}

// ============================================================
// ADD / DELETE CW COLUMNS  — inserts beside last of same type
// ============================================================
function addCW(subject, type) {
  const sd = subjectData[subject];
  const prefix = "cw-" + type;

  // New column id
  const idx = sd.cwColumns.filter(id => id.startsWith(prefix)).length + 1;
  const colId = prefix + idx;

  // Find insertion position in cwColumns array: after the last column of same prefix group
  const group = prefixGroup(colId);
  let insertAfterIdx = -1;
  sd.cwColumns.forEach((id, i) => { if (prefixGroup(id) === group) insertAfterIdx = i; });
  if (insertAfterIdx === -1) {
    // No existing same-group column; insert before first of next group in order
    const groupOrder = ["cw-ut","cw-test","cw-proj","cw-pres"];
    const myGroupPos = groupOrder.indexOf(group);
    for (let g = myGroupPos + 1; g < groupOrder.length; g++) {
      const firstOfNext = sd.cwColumns.findIndex(id => id.startsWith(groupOrder[g]));
      if (firstOfNext !== -1) { insertAfterIdx = firstOfNext - 1; break; }
    }
    // If still -1, append at end
  }
  const arrayInsertPos = insertAfterIdx + 1;
  sd.cwColumns.splice(arrayInsertPos, 0, colId);

  // ── Update header row 2 ──
  const sk = SK(subject);
  const hdr2 = document.getElementById("tbl_"+sk).querySelector("thead tr:nth-child(2)");
  const cwTotalTh = hdr2.querySelector('th[data-role="cw-total"]');

  // Find the th of the column we insert after (or insert before cwTotal if none)
  const afterId = insertAfterIdx >= 0 ? sd.cwColumns[insertAfterIdx] : null;
  const afterTh = afterId ? document.getElementById("cwcol_"+sk+"_"+afterId) : null;

  const newTh = document.createElement("th");
  newTh.id = "cwcol_"+sk+"_"+colId;
  newTh.setAttribute("data-role","cw-col");
  newTh.style.minWidth = "78px";
  newTh.innerHTML = `${colLabel(colId)} <button class="delete-col-btn" onclick="delCW('${subject}','${colId}')">×</button>`;

  if (afterTh && afterTh.nextSibling) {
    hdr2.insertBefore(newTh, afterTh.nextSibling);
  } else {
    hdr2.insertBefore(newTh, cwTotalTh);
  }

  // ── Update each student row ──
  // Determine absolute column index in hdr2 (0-based within hdr2 children)
  const newHdrIdx = Array.from(hdr2.children).indexOf(newTh);

  document.querySelectorAll(`#tbody_${sk} tr`).forEach(row => {
    const td = document.createElement("td");
    td.className = "cw-cell";
    td.setAttribute("data-col", colId);
    td.innerHTML = `<div class="cell-inner" contenteditable="true" data-type="number"></div>`;
    // +2 for Nr and Name columns
    const pos = newHdrIdx + 2;
    if (pos >= row.children.length) row.appendChild(td);
    else row.insertBefore(td, row.children[pos]);
  });

  updateCWSpan(subject);
  attachSS();
  recalc(subject);
}

function delCW(subject, colId) {
  const sd = subjectData[subject];
  sd.cwColumns = sd.cwColumns.filter(id => id !== colId);
  if (!sd.cwColumns.length) {
    // Restore a default based on subject type
    sd.cwColumns = QUIZ_EXAM_SUBJECTS.includes(subject) ? ["cw-test1"] : ["cw-ut1"];
  }
  const sk = SK(subject);
  document.getElementById("cwcol_"+sk+"_"+colId)?.remove();
  document.querySelectorAll(`#tbody_${sk} td[data-col="${colId}"]`).forEach(td => td.remove());
  updateCWSpan(subject);
  recalc(subject);
}

function updateCWSpan(subject) {
  const sk = SK(subject);
  const h = document.getElementById("cwHdr_"+sk);
  if (h) h.colSpan = subjectData[subject].cwColumns.length + 1;
}

// ============================================================
// CALCULATION
// ============================================================
function getN(el) {
  if (!el) return 0;
  const v = parseFloat(el.textContent.trim());
  return isNaN(v) ? 0 : Math.min(100, Math.max(0, v));
}

function recalc(subject) {
  const sk = SK(subject);
  document.querySelectorAll(`#tbody_${sk} tr`).forEach(row => {
    // Exam
    const examRaw = getN(row.querySelector(".exam-score-cell .cell-inner"));
    const examPct = (examRaw / 100) * 60;

    // CW — same logic as before
    let ut = [], other = [];
    row.querySelectorAll("td[data-col]").forEach(td => {
      const id = td.getAttribute("data-col");
      const v = getN(td.querySelector(".cell-inner"));
      if (id.startsWith("cw-ut") || id.startsWith("cw-test")) ut.push(v);
      else other.push(v);
    });
    const utA   = ut.length    ? ut.reduce((a,b)=>a+b,0)/ut.length    : 0;
    const otA   = other.length ? other.reduce((a,b)=>a+b,0)/other.length : 0;
    let cwPct = 0;
    if (ut.length && other.length)   cwPct = (utA/100)*25 + (otA/100)*15;
    else if (ut.length)               cwPct = (utA/100)*40;
    else if (other.length)            cwPct = (otA/100)*40;

    const total = examPct + cwPct;

    const set = (q, v) => { const e = row.querySelector(q); if (e) e.textContent = v; };
    set(".exam-total-cell .readonly-inner",  examPct.toFixed(2));
    set(".cw-total-cell .readonly-inner",    cwPct.toFixed(2));
    set(".final-total-cell .readonly-inner", total.toFixed(2));
    set(".rounded-total-cell .readonly-inner", Math.round(total));
  });
  updateSummary();
}

// ============================================================
// SCORES
// ============================================================
function getScores() {
  const result = {};
  CLASS_STUDENTS[currentClass].forEach(n => { result[n] = {}; });
  CLASS_SUBJECTS[currentClass].forEach(subject => {
    const sk = SK(subject);
    document.querySelectorAll(`#tbody_${sk} tr`).forEach(row => {
      const name = row.querySelector(".name-inner")?.textContent.trim();
      if (!name || !result[name]) return;
      const cw    = parseFloat(row.querySelector(".cw-total-cell .readonly-inner")?.textContent) || 0;
      const exam  = parseFloat(row.querySelector(".exam-total-cell .readonly-inner")?.textContent) || 0;
      const total = parseInt(row.querySelector(".rounded-total-cell .readonly-inner")?.textContent) || 0;
      result[name][subject] = { exam, cw, total };
    });
  });
  return result;
}

// ============================================================
// SUMMARY — transposed: students across top, subjects down left
// Columns: Subject | [per student: Exam | CW | Total] ...
// ============================================================
function updateSummary() {
  const subjects  = CLASS_SUBJECTS[currentClass];
  const students  = CLASS_STUDENTS[currentClass];
  const scores    = getScores();

  // Header row 1: "Subject" + student names (each spanning 3 cols)
  let hdr1 = `<th class="sum-td-subject" rowspan="2">Subject</th>`;
  students.forEach(s => {
    hdr1 += `<th class="sum-th-student" colspan="3">${s}</th>`;
  });

  // Header row 2: under each student, three sub-headers
  let hdr2 = "";
  students.forEach(() => {
    hdr2 += `<th class="sum-th-type sum-th-exam">Exam (60%)</th>`;
    hdr2 += `<th class="sum-th-type sum-th-cw">CW (40%)</th>`;
    hdr2 += `<th class="sum-th-type sum-th-total">Total</th>`;
  });

  // Data rows: one per subject
  let rows = "";
  subjects.forEach(subject => {
    let row = `<td class="sum-td-subject"><b>${subject}</b></td>`;
    students.forEach(s => {
      const d = (scores[s] || {})[subject] || { exam: 0, cw: 0, total: 0 };
      row += `<td class="sum-td-exam">${d.exam.toFixed ? d.exam.toFixed(2) : d.exam}</td>`;
      row += `<td class="sum-td-cw">${d.cw.toFixed ? d.cw.toFixed(2) : d.cw}</td>`;
      row += `<td class="sum-td-total">${d.total}</td>`;
    });
    rows += `<tr>${row}</tr>`;
  });

  document.getElementById("summaryContainer").innerHTML = `
    <table class="summary-table">
      <thead>
        <tr>${hdr1}</tr>
        <tr>${hdr2}</tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ============================================================
// SPREADSHEET BEHAVIOUR
// ============================================================
let selCell = null, selStart = null, selEnd = null;

function attachSS() {
  document.querySelectorAll("tbody td").forEach(td => {
    if (td._ss) return; td._ss = true;
    td.addEventListener("mousedown", e => {
      const inner = td.querySelector(".cell-inner[contenteditable='true']");
      if (!inner) return;
      if (e.shiftKey && selStart) { selEnd = coords(td); highlightRange(selStart, selEnd); e.preventDefault(); }
      else selCell2(td);
    });
    const inner = td.querySelector(".cell-inner[contenteditable='true']");
    if (!inner) return;
    inner.addEventListener("focus", () => { if (selCell !== td) selCell2(td); });
    inner.addEventListener("input", () => {
      if (inner.getAttribute("data-type") === "number") {
        let raw = inner.textContent.replace(/[^0-9.]/g, "");
        const p = raw.split("."); if (p.length > 2) raw = p[0]+"."+p.slice(1).join("");
        if (inner.textContent !== raw) {
          inner.textContent = raw;
          const r = document.createRange(), s2 = window.getSelection();
          r.selectNodeContents(inner); r.collapse(false); s2.removeAllRanges(); s2.addRange(r);
        }
      }
      const tbody = td.closest("tbody");
      if (tbody) { const sk = tbody.id.replace("tbody_",""); const subj = CLASS_SUBJECTS[currentClass].find(s => SK(s)===sk); if (subj) recalc(subj); }
    });
    inner.addEventListener("keydown", e => {
      const c = coords(td); let next = null;
      if (e.key==="Tab")        { e.preventDefault(); next = cellAt(td,c.ri,c.ci+1) || cellAt(td,c.ri+1,2); }
      else if (e.key==="Enter") { e.preventDefault(); next = cellAt(td,c.ri+1,c.ci); }
      else if (e.key==="ArrowUp")   { e.preventDefault(); next = cellAt(td,c.ri-1,c.ci); }
      else if (e.key==="ArrowDown") { e.preventDefault(); next = cellAt(td,c.ri+1,c.ci); }
      if (next) selCell2(next);
    });
  });
}

function coords(td) { const row=td.parentElement, tbody=row.parentElement; return { ri: Array.from(tbody.children).indexOf(row), ci: Array.from(row.children).indexOf(td) }; }
function cellAt(ref,ri,ci) { const tbody=ref.closest("tbody"); if(!tbody) return null; const rows=Array.from(tbody.children); if(ri<0||ri>=rows.length) return null; const cells=Array.from(rows[ri].children); if(ci<0||ci>=cells.length) return null; return cells[ci].querySelector(".cell-inner[contenteditable='true']") ? cells[ci] : null; }
function selCell2(td) { clearSel(); selCell=td; selStart=coords(td); selEnd={...selStart}; td.classList.add("selected"); td.querySelector(".cell-inner")?.focus(); }
function clearSel() { document.querySelectorAll("td.selected").forEach(t=>t.classList.remove("selected")); document.querySelectorAll("td.in-range").forEach(t=>t.classList.remove("in-range")); selCell=null; }
function highlightRange(s,e) {
  document.querySelectorAll("td.in-range").forEach(t=>t.classList.remove("in-range"));
  if (!s||!e||!selCell) return;
  const tbody=selCell.closest("tbody"); if (!tbody) return;
  const r1=Math.min(s.ri,e.ri),r2=Math.max(s.ri,e.ri),c1=Math.min(s.ci,e.ci),c2=Math.max(s.ci,e.ci);
  Array.from(tbody.children).slice(r1,r2+1).forEach(row=>Array.from(row.children).slice(c1,c2+1).forEach(c=>c.classList.add("in-range")));
}

document.addEventListener("paste", e => {
  if (!selCell) return;
  if (!selCell.querySelector(".cell-inner[contenteditable='true']")) return;
  e.preventDefault();
  const text = (e.clipboardData||window.clipboardData).getData("text");
  const pasteRows = text.split(/\r?\n/).map(r => r.split("\t"));
  const start = selStart || coords(selCell);
  const tbody = selCell.closest("tbody"); if (!tbody) return;
  const bRows = Array.from(tbody.children);
  pasteRows.forEach((pr, ro) => {
    const ri = start.ri + ro; if (ri >= bRows.length) return;
    const cells = Array.from(bRows[ri].children);
    pr.forEach((val, co) => {
      const ci = start.ci + co; if (ci >= cells.length) return;
      const inner = cells[ci].querySelector(".cell-inner[contenteditable='true']"); if (!inner) return;
      let v = val.trim(); if (inner.getAttribute("data-type")==="number") v = v.replace(/[^0-9.]/g,"");
      inner.textContent = v; cells[ci].classList.add("paste-flash"); setTimeout(()=>cells[ci].classList.remove("paste-flash"),300);
    });
  });
  const sk = tbody.id.replace("tbody_",""); const subj = CLASS_SUBJECTS[currentClass].find(s=>SK(s)===sk); if (subj) recalc(subj);
});

document.addEventListener("copy", e => {
  if (!selStart||!selEnd||!selCell) return;
  const r1=Math.min(selStart.ri,selEnd.ri),r2=Math.max(selStart.ri,selEnd.ri),c1=Math.min(selStart.ci,selEnd.ci),c2=Math.max(selStart.ci,selEnd.ci);
  if (r1===r2&&c1===c2) return;
  e.preventDefault();
  const tbody = selCell.closest("tbody"); if (!tbody) return;
  const rows = Array.from(tbody.children); const lines = [];
  for (let r=r1;r<=r2;r++) { const cells=Array.from(rows[r].children); const cols=[]; for (let c=c1;c<=c2;c++) { const cell=cells[c]; const inner=cell?.querySelector(".cell-inner")||cell?.querySelector(".readonly-inner"); cols.push(inner?inner.textContent.trim():cell?.textContent.trim()||""); } lines.push(cols.join("\t")); }
  e.clipboardData.setData("text/plain", lines.join("\n"));
});

// EXPORT ALL TO SHEETS
// ============================================================
function exportAllToSheets() {
  const ay    = document.getElementById("academicYear").value;
  const term  = document.getElementById("termSelect").value;
  const cls   = document.getElementById("classSelect").value;
  const subjects = CLASS_SUBJECTS[currentClass], students = CLASS_STUDENTS[currentClass], scores = getScores();
  const wb = XLSX.utils.book_new();

  subjects.forEach(subject => {
    const sk = SK(subject), sd = subjectData[subject];
    const data = [];
    data.push(["PRIME International School"]);
    data.push(["Academic Year:",ay,"Term:",term,"Class:",cls]);
    data.push(["Subject:",subject]);
    data.push([]);
    // Column order: Nr, Name, Exam Score, Exam Total, CW cols..., CW Total, Original, Rounded
    data.push(["Nr.","Student Name","Exam Score","Exam Total (60%)",...sd.cwColumns.map(id=>colLabel(id)),"CW Total (40%)","Original","Rounded"]);

    const tbody = document.getElementById("tbody_"+sk);
    if (tbody) {
      Array.from(tbody.querySelectorAll("tr")).forEach((row,i) => {
        const name = row.querySelector(".name-inner")?.textContent.trim()||"";
        const examRaw = parseFloat(row.querySelector(".exam-score-cell .cell-inner")?.textContent)||0;
        const examTot = parseFloat(row.querySelector(".exam-total-cell .readonly-inner")?.textContent)||0;
        const cwCols  = sd.cwColumns.map(id => parseFloat(row.querySelector(`td[data-col="${id}"] .cell-inner`)?.textContent)||0);
        const cwTot   = parseFloat(row.querySelector(".cw-total-cell .readonly-inner")?.textContent)||0;
        const orig    = parseFloat(row.querySelector(".final-total-cell .readonly-inner")?.textContent)||0;
        const rnd     = parseInt(row.querySelector(".rounded-total-cell .readonly-inner")?.textContent)||0;
        data.push([i+1, name, examRaw, examTot, ...cwCols, cwTot, orig, rnd]);
      });
    }
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws["!cols"] = (data[4]||[]).map(()=>({wch:16}));
    XLSX.utils.book_append_sheet(wb, ws, subject.substring(0,31));
  });

  // Summary tab — same transposed layout as on-screen
  const sd2 = [];
  sd2.push(["PRIME International School — Student Report Summary"]);
  sd2.push(["Academic Year:",ay,"Term:",term,"Class:",cls]);
  sd2.push([]);
  // Header row 1: Subject + each student (spans 3 cols represented by repeating name)
  sd2.push(["Subject", ...students.flatMap(s=>[s,"",""])]);
  // Header row 2: sub-headers
  sd2.push(["",          ...students.flatMap(()=>["Exam (60%)","CW (40%)","Total"])]);
  subjects.forEach(subject => {
    const row = [subject, ...students.flatMap(s => {
      const d = (scores[s]||{})[subject]||{exam:0,cw:0,total:0};
      return [d.exam.toFixed?d.exam.toFixed(2):d.exam, d.cw.toFixed?d.cw.toFixed(2):d.cw, d.total];
    })];
    sd2.push(row);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(sd2);
  ws2["!cols"] = [{wch:22},...students.flatMap(()=>[{wch:12},{wch:10},{wch:10}])];
  XLSX.utils.book_append_sheet(wb, ws2, "Student Report Summary");

  const fn = `${cls}_${ay.replace(/-/g,"_")}_${term.replace(/\s+/g,"_")}_Assessment.xlsx`;
  XLSX.writeFile(wb, fn);
  document.getElementById("statusMsg").textContent = "✅ Exported: "+fn;
}

async function createAllStudentReports() {
  const statusEl = document.getElementById("statusMsg");
  statusEl.innerHTML = `<span class="spinner"></span> Preparing report data...`;
  await new Promise(r => setTimeout(r, 50));

  const ay       = document.getElementById("academicYear").value;
  const term     = document.getElementById("termSelect").value;
  const cls      = document.getElementById("classSelect").value;
  const subjects = CLASS_SUBJECTS[currentClass];
  const students = CLASS_STUDENTS[currentClass];
  const scores   = getScores();

  const reportData = { academicYear:ay, term, classId:cls, subjects, students, scores, quizExamSubjects: QUIZ_EXAM_SUBJECTS };

  const zip = new JSZip();
  zip.file("report_data.json",  JSON.stringify(reportData, null, 2));
  zip.file("generate_reports.js", buildNodeScript(reportData));
  zip.file("README.txt", buildReadme(cls, term, students.length));

  const blob = await zip.generateAsync({ type:"blob" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = `${cls}_${term.replace(/\s+/g,"_")}_Reports_Generator.zip`; a.click();
  URL.revokeObjectURL(url);

  statusEl.textContent = `✅ Package downloaded! See README.txt inside the ZIP for instructions (works on Mac & Windows).`;
}

function buildReadme(cls, term, count) {
  return `PRIME International School — Student Report Generator
=====================================================
This package generates one .docx report per student (${count} students).

REQUIREMENTS
  • Node.js  →  https://nodejs.org  (LTS version recommended)
  • Works on macOS, Windows, and Linux

STEPS
  1. Unzip this package into a folder.
  2. Open Terminal (Mac) or Command Prompt / PowerShell (Windows).
  3. Navigate to the folder:
       Mac/Linux:  cd ~/Downloads/${cls}_${term.replace(/\s+/g,"_")}_Reports_Generator
       Windows:    cd %USERPROFILE%\\Downloads\\${cls}_${term.replace(/\s+/g,"_")}_Reports_Generator
  4. Install the required library (first time only):
       npm install docx
  5. Run the generator:
       node generate_reports.js
  6. All .docx files will appear in the same folder.

TROUBLESHOOTING
  • "node: command not found"  →  Node.js is not installed. Download from https://nodejs.org
  • "Cannot find module 'docx'"  →  Run: npm install docx
  • Permission error on Mac  →  Try: chmod +x generate_reports.js
`;
}

// ---- Node.js generator script (embedded as a string) ----
function buildNodeScript(data) {
  const json = JSON.stringify(data);
  return `#!/usr/bin/env node
// PRIME International School — Student Report Generator
// Cross-platform: macOS, Windows, Linux
// Usage: npm install docx   then   node generate_reports.js

'use strict';
const path = require('path');
const fs   = require('fs');

let docx;
try {
  docx = require('docx');
} catch(e) {
  console.error('\\n❌  Missing dependency. Please run:  npm install docx\\n');
  process.exit(1);
}

const {
  Document, Packer, Paragraph, TextRun,
  Table, TableRow, TableCell,
  AlignmentType, WidthType, BorderStyle, ShadingType, VerticalAlign
} = docx;

const DATA = ${json};

// ── helpers ──
const border   = { style: BorderStyle.SINGLE, size: 4, color: "BBBBBB" };
const allBords = { top: border, bottom: border, left: border, right: border };

function cell(text, { bold=false, fill="FFFFFF", align=AlignmentType.CENTER, w=1400, size=20 } = {}) {
  return new TableCell({
    borders: allBords,
    width: { size: w, type: WidthType.DXA },
    shading: { fill, type: ShadingType.CLEAR },
    margins: { top: 60, bottom: 60, left: 100, right: 100 },
    verticalAlign: VerticalAlign.CENTER,
    children: [new Paragraph({
      alignment: align,
      children: [new TextRun({ text: String(text ?? ""), bold, font: "Arial", size })]
    })]
  });
}
const hCell = (text, opts={}) => cell(text, { bold:true, fill:"D6E4F0", ...opts });

// ── per-student generator ──
async function generateStudent(name) {
  const sc = DATA.scores[name] || {};
  const paperSubs   = DATA.subjects.filter(s => !DATA.quizExamSubjects.includes(s));
  const quizSubs    = DATA.subjects.filter(s =>  DATA.quizExamSubjects.includes(s));
  const obsSubs     = ["PE","Taekwondo","Art","Music"];

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size:   { width: 11906, height: 16838 },
          margin: { top: 1000, right: 1000, bottom: 1000, left: 1000 }
        }
      },
      children: [
        // ── title block ──
        new Paragraph({ alignment: AlignmentType.RIGHT, spacing:{after:0},   children:[new TextRun({text:"Progress Report",bold:true,size:28,font:"Arial"})] }),
        new Paragraph({ alignment: AlignmentType.RIGHT, spacing:{after:0},   children:[new TextRun({text:"Academic Year "+DATA.academicYear,size:22,font:"Arial"})] }),
        new Paragraph({ alignment: AlignmentType.RIGHT, spacing:{after:240}, children:[new TextRun({text:DATA.term,size:22,font:"Arial"})] }),

        // ── student info ──
        new Paragraph({ spacing:{after:60}, children:[new TextRun({text:"Student's Name : ",bold:true,font:"Arial",size:22}),new TextRun({text:name,font:"Arial",size:22})] }),
        new Paragraph({ spacing:{after:60}, children:[new TextRun({text:"Student's ID : ",bold:true,font:"Arial",size:22}),new TextRun({text:"",font:"Arial",size:22})] }),
        new Paragraph({ spacing:{after:60}, children:[new TextRun({text:"Class : ",bold:true,font:"Arial",size:22}),new TextRun({text:DATA.classId,font:"Arial",size:22})] }),
        new Paragraph({ spacing:{after:60}, children:[new TextRun({text:"Teacher's Name : ",bold:true,font:"Arial",size:22}),new TextRun({text:"",font:"Arial",size:22})] }),
        new Paragraph({ spacing:{after:200},children:[new TextRun({text:"Issue Date : ",bold:true,font:"Arial",size:22}),new TextRun({text:"",font:"Arial",size:22})] }),

        // ── attendance ──
        new Paragraph({ spacing:{after:80}, children:[new TextRun({text:"Attendance",bold:true,size:24,font:"Arial"})] }),
        new Table({ width:{size:5400,type:WidthType.DXA}, columnWidths:[1800,1800,1800], rows:[
          new TableRow({children:[hCell("Total School Days",{w:1800}),hCell("Days of Presence",{w:1800}),hCell("Days of Absence",{w:1800})]}),
          new TableRow({children:[cell("",{w:1800}),cell("",{w:1800}),cell("",{w:1800})]})
        ]}),

        // ── paper-based test ──
        new Paragraph({ spacing:{before:240,after:80}, children:[new TextRun({text:"Paper-Based Test",bold:true,size:24,font:"Arial"})] }),
        new Table({
          width:{size:6200,type:WidthType.DXA},
          columnWidths:[2000,700,1200,1200,1100],
          rows:[
            new TableRow({children:[
              hCell("Paper-Based Test",{w:2000,align:AlignmentType.LEFT}),
              hCell("Max",{w:700}),
              hCell("Term Exam (60%)",{w:1200}),
              hCell("Course Work (40%)",{w:1200}),
              hCell("TOTAL",{w:1100})
            ]}),
            ...paperSubs.map(s => {
              const d = sc[s] || {exam:0,cw:0,total:0};
              return new TableRow({children:[
                cell(s,  {w:2000,align:AlignmentType.LEFT}),
                cell("100",{w:700}),
                cell(typeof d.exam==="number" ? d.exam.toFixed(2) : d.exam, {w:1200}),
                cell(typeof d.cw  ==="number" ? d.cw.toFixed(2)  : d.cw,   {w:1200}),
                cell(d.total, {bold:true,fill:"EAFFEA",w:1100})
              ]});
            })
          ]
        }),

        // ── quiz/exam subjects (Chinese) ──
        ...(quizSubs.length ? [
          new Paragraph({ spacing:{before:180,after:80}, children:[new TextRun({text:"Chinese",bold:true,size:24,font:"Arial"})] }),
          new Table({
            width:{size:6200,type:WidthType.DXA},
            columnWidths:[2000,700,1200,1200,1100],
            rows:[
              new TableRow({children:[
                hCell("Paper-Based Test",{w:2000,align:AlignmentType.LEFT}),
                hCell("Max",{w:700}),
                hCell("Term Exam (60%)",{w:1200}),
                hCell("Quizzes (40%)",{w:1200}),
                hCell("TOTAL",{w:1100})
              ]}),
              ...quizSubs.map(s => {
                const d = sc[s] || {exam:0,cw:0,total:0};
                return new TableRow({children:[
                  cell(s,  {w:2000,align:AlignmentType.LEFT}),
                  cell("100",{w:700}),
                  cell(typeof d.exam==="number" ? d.exam.toFixed(2) : d.exam, {w:1200}),
                  cell(typeof d.cw  ==="number" ? d.cw.toFixed(2)  : d.cw,   {w:1200}),
                  cell(d.total, {bold:true,fill:"EAFFEA",w:1100})
                ]});
              })
            ]
          })
        ] : []),

        // ── observational assessments ──
        new Paragraph({ spacing:{before:200,after:80}, children:[new TextRun({text:"Observational Assessments",bold:true,size:24,font:"Arial"})] }),
        new Table({
          width:{size:6800,type:WidthType.DXA},
          columnWidths:[2800,1400,1300,1300],
          rows:[
            new TableRow({children:[hCell("Subject",{w:2800,align:AlignmentType.LEFT}),hCell("Strong Proficiency",{w:1400}),hCell("Proficient",{w:1300}),hCell("Developing",{w:1300})]}),
            ...obsSubs.map(s => new TableRow({children:[cell(s,{w:2800,align:AlignmentType.LEFT}),cell("",{w:1400}),cell("",{w:1300}),cell("",{w:1300})]}))
          ]
        }),

        // ── commentary ──
        new Paragraph({ spacing:{before:220,after:80}, children:[new TextRun({text:"Commentary Section — "+DATA.term,bold:true,size:24,font:"Arial"})] }),
        new Table({
          width:{size:9026,type:WidthType.DXA},
          columnWidths:[1500,7526],
          rows:[
            new TableRow({children:[hCell("Subjects",{w:1500,align:AlignmentType.LEFT}),hCell("Comments",{w:7526,align:AlignmentType.LEFT})]}),
            ...[...paperSubs,...quizSubs].map(s => new TableRow({children:[
              cell(s,{w:1500,align:AlignmentType.LEFT,bold:true,fill:"F5F5F5"}),
              cell("",{w:7526,align:AlignmentType.LEFT})
            ]}))
          ]
        }),

        // ── signatures ──
        new Paragraph({ spacing:{before:440,after:60}, children:[] }),
        new Paragraph({
          children:[
            new TextRun({text:"Principal's Signature",bold:true,font:"Arial",size:20}),
            new TextRun({text:"          ",font:"Arial",size:20}),
            new TextRun({text:"Class Teacher's Signature",bold:true,font:"Arial",size:20}),
            new TextRun({text:"          ",font:"Arial",size:20}),
            new TextRun({text:"Parent's Signature",bold:true,font:"Arial",size:20}),
          ]
        }),
      ]
    }]
  });

  const buf = await Packer.toBuffer(doc);
  // path.join ensures correct separators on all OSes
  const filename = path.join(__dirname, name.replace(/[/\\\\:*?"<>|]/g,"_") + "_Progress_Report_" + DATA.term.replace(/\\s+/g,"_") + ".docx");
  fs.writeFileSync(filename, buf);
  console.log("\\u2705 Created:", path.basename(filename));
}

// ── run ──
(async () => {
  console.log("\\nPRIME International School — Report Generator");
  console.log("Generating reports for", DATA.students.length, "students...\\n");
  let ok = 0, fail = 0;
  for (const name of DATA.students) {
    try { await generateStudent(name); ok++; }
    catch(err) { console.error("  FAILED:", name, err.message); fail++; }
  }
  const summary = fail===0 ? "All done!" : ("Done with "+fail+" error(s).");
  console.log("\\n" + summary + "  (" + ok + " reports created)");
})();
`;
}
