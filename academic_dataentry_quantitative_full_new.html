<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assessment Entry — PRIME International School</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui; background: #f0f2f5; padding: 20px; color: #1d1d1f; }
.page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.page-subtitle { font-size: 13px; color: #666; margin-bottom: 12px; }
.dropdown-label { font-size: 13px; font-weight: 600; }
select { padding: 4px 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px; }
.meta-bar { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 22px; align-items: center; background: #fff; padding: 12px 16px; border-radius: 10px; border: 1px solid #ddd; }
.subject-section { margin-bottom: 22px; }
.subject-header { color: white; padding: 9px 14px; border-radius: 10px 10px 0 0; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.subject-tag { font-size: 11px; background: rgba(255,255,255,0.2); padding: 2px 7px; border-radius: 999px; font-weight: 400; }
.cw-btns { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
.btn-sm { padding: 3px 9px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.12); color: white; cursor: pointer; font-size: 11px; }
.btn-sm:hover { background: rgba(255,255,255,0.28); }
.card { background: #fff; border-radius: 0 0 10px 10px; border: 1px solid #ddd; border-top: none; padding: 12px; }
.table-wrapper { overflow-x: auto; border: 1px solid #c0c0c0; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
th, td { border: 1px solid #c0c0c0; padding: 0; text-align: center; }
th { background: #f3f3f3; font-weight: 600; white-space: nowrap; padding: 5px 8px; border-color: #b0b0b0; font-size: 11px; user-select: none; }
td:first-child { background: #f0f0f0; color: #999; font-size: 11px; width: 28px; min-width: 28px; user-select: none; padding: 3px; }
td.label-col { text-align: left; padding: 0; min-width: 150px; }
.cell-inner { display: block; width: 100%; min-height: 24px; padding: 3px 6px; outline: none; text-align: right; cursor: cell; font-size: 12px; font-family: inherit; }
.cell-inner.name-inner { text-align: left; cursor: default; }
td.selected { outline: 2px solid #1a73e8; outline-offset: -2px; z-index: 2; position: relative; }
td.in-range { background-color: rgba(26,115,232,0.10) !important; }
.exam-cell  { background: #fffbea; }
.exam-total-cell { background: #fff0a0; font-weight: 600; }
.cw-cell    { background: #eaf4ff; }
.cw-total-cell { background: #cfe2ff; font-weight: 600; }
.total-cell { background: #eaffea; font-weight: 600; }
.readonly-inner { display: block; width: 100%; min-height: 24px; padding: 3px 6px; text-align: right; font-size: 12px; font-family: inherit; cursor: default; user-select: none; }
.delete-col-btn { font-size: 10px; background: none; border: none; color: #f88; cursor: pointer; margin-left: 2px; }
@keyframes paste-flash { 0%{background:rgba(26,115,232,0.35);} 100%{background:transparent;} }
.paste-flash { animation: paste-flash 0.3s ease-out; }

/* upload / template bar */
.upload-bar { background:#fff; border:1px solid #ddd; border-radius:10px; padding:14px 18px; margin-bottom:18px; display:flex; flex-wrap:wrap; gap:14px; align-items:center; }
.upload-bar-title { font-size:13px; font-weight:700; color:#1d3461; flex-basis:100%; margin-bottom:2px; }
.btn-upload-template { background:#e8f0fe; color:#1a73e8; border:1px solid #c5d8ff; border-radius:8px; padding:7px 14px; font-size:12px; font-weight:600; cursor:pointer; }
.btn-upload-template:hover { background:#d0e4ff; }
.btn-upload-file { background:#e8f5e9; color:#2d6a4f; border:1px solid #b0ddb8; border-radius:8px; padding:7px 14px; font-size:12px; font-weight:600; cursor:pointer; }
.btn-upload-file:hover { background:#c8ead0; }
.upload-hint { font-size:11px; color:#888; }
#fileUploadInput { display:none; }
.upload-status { font-size:12px; font-weight:600; color:#2d6a4f; }

/* summary */
.summary-section { margin-top: 30px; }
.section-heading { font-size: 17px; font-weight: 700; padding: 10px 16px; border-radius: 10px 10px 0 0; color: white; }
.summary-heading { background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%); }
.summary-card { background: #fff; border-radius: 0 0 10px 10px; border: 1px solid #ddd; border-top: none; padding: 14px; overflow-x: auto; }
.summary-table { border-collapse: collapse; font-size: 12px; }
.summary-table th, .summary-table td { border: 1px solid #b0b0b0; padding: 5px 8px; text-align: center; white-space: nowrap; }
.sum-th-student { background: #1d3557; color: white; font-size: 11px; text-align: center; }
.sum-th-type { font-size: 10px; font-weight: 600; padding: 3px 5px; white-space: nowrap; }
.sum-th-exam  { background: #fff0a0; color: #555; }
.sum-th-cw    { background: #cfe2ff; color: #555; }
.sum-th-total { background: #b6efb6; color: #222; }
.sum-td-subject { text-align: left; font-weight: 700; background: #f5f5f5; min-width: 130px; padding: 5px 10px; }
.sum-td-exam  { background: #fffbea; }
.sum-td-cw    { background: #eaf4ff; }
.sum-td-total { background: #eaffea; font-weight: 700; }
.bottom-btns { margin-top: 32px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; padding: 20px; background: #fff; border-radius: 12px; border: 1px solid #ddd; }
.btn-big { padding: 12px 26px; border-radius: 999px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
.btn-big:active { transform: scale(0.97); }
.btn-export { background: #0071e3; color: white; }
.btn-export:hover { background: #005bbd; }
.btn-docs { background: #6f42c1; color: white; }
.btn-docs:hover { background: #5a34a0; }
.btn-submit { background: #b0b0b0; color: #fff; opacity: 0.6; cursor: not-allowed; pointer-events: none; }
.status-msg { margin-top: 12px; font-size: 13px; color: #2d6a4f; font-weight: 600; min-height: 20px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #6f42c1; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="page-title">&#128203; Assessment Score &mdash; Report Card Calculator V3</div>
<div class="page-subtitle">PRIME International School &middot; All subjects on one page</div>

<div class="upload-bar">
  <div class="upload-bar-title">&#128196; Import Scores from Google Sheets / Excel</div>
  <button class="btn-upload-template" onclick="downloadTemplate()">&#11015; Download Template</button>
  <label class="btn-upload-file" for="fileUploadInput">&#128196; Upload Filled Sheet (.xlsx)</label>
  <input type="file" id="fileUploadInput" accept=".xlsx,.xls" onchange="handleFileUpload(event)">
  <span class="upload-hint">Upload fills in scores automatically &mdash; manual editing still works after upload.</span>
  <span class="upload-status" id="uploadStatus"></span>
</div>

<div class="meta-bar">
  <span class="dropdown-label">Academic Year:</span>
  <select id="academicYear"><option>2025-2026</option></select>
  <span class="dropdown-label">Term:</span>
  <select id="termSelect"><option>Term 1</option><option>Term 2</option><option>Term 3</option></select>
  <span class="dropdown-label">Class:</span>
  <select id="classSelect" onchange="loadClass()">
    <option value="Y1-A">Y1-A</option>
    <option value="Y2-A">Y2-A</option>
  </select>
</div>

<div id="subjectSections"></div>

<div class="summary-section">
  <div class="section-heading summary-heading">&#128202; Student Report Summary</div>
  <div class="summary-card" id="summaryContainer"></div>
</div>

<div class="bottom-btns">
  <button class="btn-big btn-export" onclick="exportAllToSheets()">&#128229; Export All to Sheets</button>
  <button class="btn-big btn-docs" onclick="createAllStudentReports()">&#128196; Create All Student Reports to Docs</button>
  <button class="btn-big btn-submit" disabled>Submit Scores</button>
</div>
<div class="status-msg" id="statusMsg"></div>

<script>
// ============================================================
// DATA
// ============================================================
const CLASS_STUDENTS = {
  "Y1-A": ["Ye Yint Tayza Hman","Shoon La Woon Htet","Htun Lae Yi Mon","Lwin Aung Hein","Aung Bhone San","Htet Nay Bhone","Sian Vang Huai Kim","Thu Htet Htoo","Khant Su Thar","Lwin Khit","Htut Myat Aung","Myat Shwe Yee Thin","Kaung Khit Han","Linn Pyae Sone Aung","Sai Noon Wan Han","Ngwe Yati Moe","Khant Htet Zen"],
  "Y2-A": ["Zin Aung Hlaing","Phoo Pyae Heather","Shwe Sin Htet Aung","Thoon Thu San Aung","Linn Phone Khit","Khunn Thansin Han","Lin Thiri Hmue","Yuu Mi Khaing Lin","Yoon Htet Htet"]
};
const CLASS_SUBJECTS = {
  "Y1-A": ["English","Mathematics","Science","Social Studies","Myanmar","Wellbeing","ICT","Chinese"],
  "Y2-A": ["English","Mathematics","Science","Social Studies","Myanmar","Myanmar Social Studies","Wellbeing","ICT","Chinese"]
};

// Chinese is tests-only: 100% average of all tests, no term exam at all
const TEST_ONLY_SUBJECTS = ["Chinese"];

const SUBJECT_COLORS = {
  "English":"#1d3557","Mathematics":"#8b3a0f","Science":"#1a6b2a","Social Studies":"#7b4f12",
  "Myanmar":"#8b1a4a","Myanmar Social Studies":"#5b2d8e","Wellbeing":"#0e6b6b","ICT":"#1a3d6b","Chinese":"#8b0000"
};

let subjectData = {}, currentClass = "Y1-A";

// ============================================================
// HELPERS
// ============================================================
function SK(s) { return s.replace(/\s+/g,"_").replace(/[^a-zA-Z0-9_]/g,""); }

function colLabel(id) {
  if (id.startsWith("cw-ut"))   return "Unit Test "    + id.replace("cw-ut","");
  if (id.startsWith("cw-test")) return "Test "         + id.replace("cw-test","");
  if (id.startsWith("cw-proj")) return "Project "      + id.replace("cw-proj","");
  if (id.startsWith("cw-pres")) return "Presentation " + id.replace("cw-pres","");
  return id;
}

function prefixGroup(id) {
  if (id.startsWith("cw-ut"))   return "cw-ut";
  if (id.startsWith("cw-test")) return "cw-test";
  if (id.startsWith("cw-proj")) return "cw-proj";
  if (id.startsWith("cw-pres")) return "cw-pres";
  return "other";
}

// ============================================================
// INIT / CLASS LOAD
// ============================================================
function loadClass() {
  currentClass = document.getElementById("classSelect").value;
  subjectData = {};
  CLASS_SUBJECTS[currentClass].forEach(s => {
    const isTestOnly = TEST_ONLY_SUBJECTS.includes(s);
    subjectData[s] = { cwColumns: isTestOnly ? ["cw-test1"] : ["cw-ut1"] };
  });
  renderAllSubjects();
  updateSummary();
}

// ============================================================
// RENDER
// ============================================================
function renderAllSubjects() {
  const container = document.getElementById("subjectSections");
  container.innerHTML = "";
  CLASS_SUBJECTS[currentClass].forEach(s => renderSubject(s, container));
  attachSS();
}

function renderSubject(subject, container) {
  const isTestOnly = TEST_ONLY_SUBJECTS.includes(subject);
  const sd = subjectData[subject];
  const sk = SK(subject);
  const color = SUBJECT_COLORS[subject] || "#1d3557";
  const students = CLASS_STUDENTS[currentClass];

  const div = document.createElement("div");
  div.className = "subject-section";
  div.id = "sec_"+sk;

  let cwBtnsHtml;
  if (isTestOnly) {
    cwBtnsHtml = `<div class="cw-btns"><button class="btn-sm" onclick="addCW('${subject}','test')">+ Test</button></div>`;
  } else {
    cwBtnsHtml = `<div class="cw-btns">
      <button class="btn-sm" onclick="addCW('${subject}','ut')">+ Unit Test</button>
      <button class="btn-sm" onclick="addCW('${subject}','proj')">+ Project</button>
      <button class="btn-sm" onclick="addCW('${subject}','pres')">+ Presentation</button>
    </div>`;
  }

  let hdr1, hdr2Html, subjectTag;
  if (isTestOnly) {
    subjectTag = "Tests Only (100% average)";
    const cwSubColsHtml = sd.cwColumns.map(id => `<th id="cwcol_${sk}_${id}" data-role="cw-col">${colLabel(id)} <button class="delete-col-btn" onclick="delCW('${subject}','${id}')">×</button></th>`).join("");
    hdr1 = `<tr><th rowspan="2">Nr.</th><th rowspan="2" style="min-width:155px;text-align:left;padding-left:8px;">Student Name</th><th id="cwHdr_${sk}" colspan="${sd.cwColumns.length}" style="background:#d6ebff;">Tests (100%)</th><th rowspan="2" style="background:#eaffea;">Total (Rounded)</th></tr>`;
    hdr2Html = `<tr>${cwSubColsHtml}</tr>`;
  } else {
    subjectTag = "40% CW + 60% Exam";
    const cwSubColsHtml = sd.cwColumns.map(id => `<th id="cwcol_${sk}_${id}" data-role="cw-col">${colLabel(id)} <button class="delete-col-btn" onclick="delCW('${subject}','${id}')">×</button></th>`).join("") + `<th data-role="cw-total">CW Total</th>`;
    hdr1 = `<tr><th rowspan="2">Nr.</th><th rowspan="2" style="min-width:155px;text-align:left;padding-left:8px;">Student Name</th><th colspan="2" style="background:#fff0a0;">Term Exam 60%</th><th id="cwHdr_${sk}" colspan="${sd.cwColumns.length+1}" style="background:#d6ebff;">Coursework 40%</th><th colspan="2" style="background:#eaffea;">TOTAL (100%)</th></tr>`;
    hdr2Html = `<tr><th data-role="exam-score">Exam Score</th><th data-role="exam-total">Exam Total</th>${cwSubColsHtml}<th data-role="original-total">Original</th><th data-role="rounded-total">Rounded</th></tr>`;
  }

  div.innerHTML = `
    <div class="subject-header" style="background:${color};">${subject} <span class="subject-tag">${subjectTag}</span> ${cwBtnsHtml}</div>
    <div class="card"><div class="table-wrapper"><table id="tbl_${sk}"><thead>${hdr1}${hdr2Html}</thead><tbody id="tbody_${sk}"></tbody></table></div></div>`;

  container.appendChild(div);
  students.forEach((name, i) => buildRow(div.querySelector(`#tbody_${sk}`), i+1, name, subject));
  recalc(subject);
}

function buildRow(tbody, nr, name, subject) {
  const isTestOnly = TEST_ONLY_SUBJECTS.includes(subject);
  const sd = subjectData[subject];
  const tr = document.createElement("tr");
  tr.setAttribute("data-student", name);
  let html = `<td>${nr}</td><td class="label-col"><div class="cell-inner name-inner">${name}</div></td>`;
  if (isTestOnly) {
    sd.cwColumns.forEach(id => { html += `<td class="cw-cell" data-col="${id}"><div class="cell-inner" contenteditable="true" data-type="number"></div></td>`; });
    html += `<td class="total-cell rounded-total-cell"><span class="readonly-inner">0</span></td>`;
  } else {
    html += `<td class="exam-cell exam-score-cell"><div class="cell-inner" contenteditable="true" data-type="number"></div></td><td class="exam-total-cell"><span class="readonly-inner">0.00</span></td>`;
    sd.cwColumns.forEach(id => { html += `<td class="cw-cell" data-col="${id}"><div class="cell-inner" contenteditable="true" data-type="number"></div></td>`; });
    html += `<td class="cw-total-cell"><span class="readonly-inner">0.00</span></td><td class="total-cell final-total-cell"><span class="readonly-inner">0.00</span></td><td class="total-cell rounded-total-cell"><span class="readonly-inner">0</span></td>`;
  }
  tr.innerHTML = html;
  tbody.appendChild(tr);
}

// Column logic, Calc, and Excel Exports follow (REINSTATED)
function addCW(subject, type) {
  const sd = subjectData[subject];
  const prefix = "cw-" + type;
  const colId = prefix + (sd.cwColumns.filter(id => id.startsWith(prefix)).length + 1);
  const group = prefixGroup(colId);
  let insertAfterIdx = -1;
  sd.cwColumns.forEach((id, i) => { if (prefixGroup(id) === group) insertAfterIdx = i; });
  sd.cwColumns.splice(insertAfterIdx + 1, 0, colId);
  renderAllSubjects();
}

function delCW(subject, colId) {
  const sd = subjectData[subject];
  sd.cwColumns = sd.cwColumns.filter(id => id !== colId);
  if (!sd.cwColumns.length) sd.cwColumns = [TEST_ONLY_SUBJECTS.includes(subject) ? "cw-test1" : "cw-ut1"];
  renderAllSubjects();
}

function updateCWSpan(subject) {
  const sk = SK(subject);
  const h = document.getElementById("cwHdr_"+sk);
  if (h) h.colSpan = TEST_ONLY_SUBJECTS.includes(subject) ? subjectData[subject].cwColumns.length : subjectData[subject].cwColumns.length + 1;
}

function getN(el) { if (!el) return 0; const v = parseFloat(el.textContent.trim()); return isNaN(v) ? 0 : Math.min(100, Math.max(0, v)); }

function recalc(subject) {
  const isTestOnly = TEST_ONLY_SUBJECTS.includes(subject);
  const sk = SK(subject);
  document.querySelectorAll(`#tbody_${sk} tr`).forEach(row => {
    if (isTestOnly) {
      let tests = []; row.querySelectorAll("td[data-col]").forEach(td => tests.push(getN(td.querySelector(".cell-inner"))));
      const avg = tests.length ? tests.reduce((a,b)=>a+b,0)/tests.length : 0;
      row.querySelector(".rounded-total-cell .readonly-inner").textContent = Math.round(avg);
    } else {
      const examPct = (getN(row.querySelector(".exam-score-cell .cell-inner")) / 100) * 60;
      let ut = [], other = [];
      row.querySelectorAll("td[data-col]").forEach(td => {
        const v = getN(td.querySelector(".cell-inner"));
        if (td.getAttribute("data-col").startsWith("cw-ut")) ut.push(v); else other.push(v);
      });
      const utA = ut.length ? ut.reduce((a,b)=>a+b,0)/ut.length : 0;
      const otA = other.length ? other.reduce((a,b)=>a+b,0)/other.length : 0;
      const cwPct = (ut.length && other.length) ? (utA/100)*25 + (otA/100)*15 : (ut.length || other.length) ? ((utA+otA)/100)*40 : 0;
      row.querySelector(".exam-total-cell .readonly-inner").textContent = examPct.toFixed(2);
      row.querySelector(".cw-total-cell .readonly-inner").textContent = cwPct.toFixed(2);
      row.querySelector(".final-total-cell .readonly-inner").textContent = (examPct + cwPct).toFixed(2);
      row.querySelector(".rounded-total-cell .readonly-inner").textContent = Math.round(examPct + cwPct);
    }
  });
  updateSummary();
}

function getScores() {
  const result = {}; CLASS_STUDENTS[currentClass].forEach(n => result[n] = {});
  CLASS_SUBJECTS[currentClass].forEach(subj => {
    const isTestOnly = TEST_ONLY_SUBJECTS.includes(subj);
    document.querySelectorAll(`#tbody_${SK(subj)} tr`).forEach(row => {
      const name = row.querySelector(".name-inner")?.textContent.trim();
      if (name && result[name]) {
        const total = parseInt(row.querySelector(".rounded-total-cell .readonly-inner")?.textContent) || 0;
        result[name][subj] = { 
          exam: isTestOnly ? 0 : parseFloat(row.querySelector(".exam-total-cell .readonly-inner")?.textContent) || 0,
          cw: isTestOnly ? total : parseFloat(row.querySelector(".cw-total-cell .readonly-inner")?.textContent) || 0, 
          total 
        };
      }
    });
  });
  return result;
}

function updateSummary() {
  const subjs = CLASS_SUBJECTS[currentClass], studs = CLASS_STUDENTS[currentClass], scores = getScores();
  let hdr1 = `<th class="sum-td-subject" rowspan="2">Subject</th>`, hdr2 = "";
  studs.forEach(s => { hdr1 += `<th class="sum-th-student" colspan="3">${s}</th>`; hdr2 += `<th class="sum-th-type sum-th-exam">Exam</th><th class="sum-th-type sum-th-cw">CW</th><th class="sum-th-type sum-th-total">Total</th>`; });
  let rows = "";
  subjs.forEach(subj => {
    const isTestOnly = TEST_ONLY_SUBJECTS.includes(subj);
    let r = `<td class="sum-td-subject"><b>${subj}</b></td>`;
    studs.forEach(s => {
      const d = (scores[s] || {})[subj] || { exam: 0, cw: 0, total: 0 };
      r += isTestOnly ? `<td class="sum-td-exam" colspan="2">Tests avg</td><td class="sum-td-total">${d.total}</td>` : `<td>${d.exam.toFixed(2)}</td><td>${d.cw.toFixed(2)}</td><td class="sum-td-total">${d.total}</td>`;
    });
    rows += `<tr>${r}</tr>`;
  });
  document.getElementById("summaryContainer").innerHTML = `<table class="summary-table"><thead><tr>${hdr1}</tr><tr>${hdr2}</tr></thead><tbody>${rows}</tbody></table>`;
}

// SPREADSHEET BEHAVIOR & EXCEL LOGIC (REINSTATED)
function attachSS() {
  document.querySelectorAll("tbody td").forEach(td => {
    const inner = td.querySelector(".cell-inner[contenteditable='true']");
    if (inner) inner.oninput = () => recalc(CLASS_SUBJECTS[currentClass].find(s => SK(s) === td.closest("tbody").id.replace("tbody_","")));
  });
}

function exportAllToSheets() {
  const ay = document.getElementById("academicYear").value, term = document.getElementById("termSelect").value, cls = document.getElementById("classSelect").value, wb = XLSX.utils.book_new(), scores = getScores();
  CLASS_SUBJECTS[currentClass].forEach(subj => {
    const isTestOnly = TEST_ONLY_SUBJECTS.includes(subj), sd = subjectData[subj], data = [["PRIME International School"], ["Year:", ay, "Term:", term, "Class:", cls], ["Subject:", subj], []];
    data.push(isTestOnly ? ["Nr.", "Name", ...sd.cwColumns.map(id => colLabel(id)), "Total"] : ["Nr.", "Name", "Exam", "Exam 60%", ...sd.cwColumns.map(id => colLabel(id)), "CW 40%", "Orig", "Rnd"]);
    document.querySelectorAll(`#tbody_${SK(subj)} tr`).forEach((row, i) => {
      const name = row.querySelector(".name-inner").textContent, rnd = row.querySelector(".rounded-total-cell .readonly-inner").textContent;
      if (isTestOnly) data.push([i+1, name, ...sd.cwColumns.map(id => row.querySelector(`td[data-col="${id}"] .cell-inner`).textContent), rnd]);
      else data.push([i+1, name, row.querySelector(".exam-score-cell .cell-inner").textContent, row.querySelector(".exam-total-cell .readonly-inner").textContent, ...sd.cwColumns.map(id => row.querySelector(`td[data-col="${id}"] .cell-inner`).textContent), row.querySelector(".cw-total-cell .readonly-inner").textContent, row.querySelector(".final-total-cell .readonly-inner").textContent, rnd]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), subj.slice(0, 31));
  });
  XLSX.writeFile(wb, `${cls}_Assessment.xlsx`);
}

async function createAllStudentReports() {

  const ay = document.getElementById("academicYear").value, term = document.getElementById("termSelect").value, cls = document.getElementById("classSelect").value, zip = new JSZip();

  zip.file("report_data.json", JSON.stringify(reportData, null, 2));
  zip.file("generate_reports.js", `
    const fs = require('fs');
    const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, AlignmentType, WidthType } = require('docx');
    const data = JSON.parse(fs.readFileSync('./report_data.json', 'utf8'));
    data.students.forEach(student => {

      Packer.toBuffer(doc).then(buffer => fs.writeFileSync(student + "_Report.docx", buffer));
    });
    console.log("All reports generated!");
  `);
