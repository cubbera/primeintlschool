<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Student Enrollment & Tuition Plan System</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- DOCX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* KEEP ORIGINAL CSS */

/* NEW: Logo + Signature */
.logo {
  max-width: 180px;
  margin-bottom: 10px;
}

.signature-section {
  margin-top: 40px;
  display: flex;
  justify-content: space-between;
  gap: 40px;
}

.signature-box {
  width: 45%;
}

.signature-line {
  border-top: 1px solid #000;
  margin-top: 40px;
  padding-top: 5px;
  font-size: 13px;
}
</style>

</head>

<body>
<div class="container" id="containerRoot">

  <!-- LOGO -->
  <img src="https://via.placeholder.com/180x60?text=School+Logo" class="logo" id="logoImg">

  <h1>Student Enrollment &amp; Tuition Plan</h1>

  <h2>1. Enrollment</h2>

  <div class="enroll-table">
    <table>
      <tbody>

        <tr>
          <td width="50%">
            <div class="cell">
              <div class="t">Academic Year</div>
              <div class="v">
                <select id="academicYear">
                  <option value="AY2025-2026">AY2025–2026</option>
                  <option value="SUMMER2026">Summer 2026</option>
                  <option value="AY2026-2027" selected>AY2026–2027</option>
                </select>
              </div>
            </div>
          </td>

          <td width="50%">
            <div class="cell">
              <div class="t">Grade Level</div>
              <div class="v">
                <select id="grade">
                  <option value="SR Full-day">SR Full-day</option>
                  <option value="EY1" selected>EY1</option>
                  <option value="EY2">EY2</option>
                  <option value="Y1">Y1</option>
                  <option value="Y2">Y2</option>
                  <option value="Y3">Y3</option>
                </select>
              </div>
            </div>
          </td>
        </tr>

        <tr>
          <td>
            <div class="cell">
              <div class="t">Student ID</div>
              <div class="v">
                <input type="text" id="studentId" placeholder="Enter ID">
              </div>
            </div>
          </td>

          <td>
            <div class="cell">
              <div class="t">Student Name</div>
              <div class="v">
                <input type="text" id="studentName" placeholder="Enter name">
              </div>
            </div>
          </td>
        </tr>

        <tr>
          <td>
            <div class="cell">
              <div class="t">Payment Plan</div>
              <div class="v">
                <select id="paymentPlan">
                  <option value="One-Time">One-Time</option>
                  <option value="Termly" selected>Termly</option>
                  <option value="Monthly">Monthly</option>
                </select>
              </div>
            </div>
          </td>

          <td>
            <div class="cell">
              <div class="t">First Attendance Date</div>
              <div class="v">
                <input type="date" id="firstAttendance">
              </div>
            </div>
          </td>
        </tr>

        <tr>
          <td></td>
          <td>
            <div class="cell">
              <div class="t">First Calculation Date</div>
              <div class="v">
                <input type="date" id="firstCalcDate">
              </div>
            </div>
          </td>
        </tr>

      </tbody>
    </table>
  </div>

  <h2>2. Calculating Payment</h2>
  <div class="fee-summary" id="feeSummary"></div>

  <h2>3. Tuition Payment Plan</h2>
  <div class="plan">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Due Date</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="planBody"></tbody>
    </table>
  </div>

  <!-- SIGNATURE SECTION -->
  <div class="signature-section">
    <div class="signature-box">
      <div class="signature-line">Parent Name & Signature</div>
    </div>
    <div class="signature-box">
      <div class="signature-line">Accountant Name & Signature</div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn-cancel" onclick="clearForm()">[Clear]</button>
    <button class="btn-final" onclick="saveAndPrint()">[Save and Print]</button>
  </div>

</div>

<script>

/* KEEP YOUR ORIGINAL JS ABOVE */

/* CLEAR */
function clearForm() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  document.querySelectorAll("select").forEach(s => s.selectedIndex = 0);

  document.getElementById("academicYear").value = "AY2026-2027";
  document.getElementById("grade").value = "EY1";
  document.getElementById("paymentPlan").value = "Termly";

  discounts = [];
  renderDiscounts();
  recalc();
}


/* SAVE + PRINT + PDF */
async function saveAndPrint() {

  const { jsPDF } = window.jspdf;

  const studentName = document.getElementById("studentName").value || "Student";
  const studentId   = document.getElementById("studentId").value || "ID";
  const year        = document.getElementById("academicYear").value;
  const finalAmount = document.getElementById("finalTuitionDisplay").textContent;

  const rows = Array.from(document.querySelectorAll("#planBody tr"))
    .filter(r => !r.classList.contains("total-row"))
    .map(r => {
      const cols = r.querySelectorAll("td");
      return `${cols[0].innerText}. ${cols[1].childNodes[0].nodeValue.trim()} — ${cols[2].innerText}`;
    });

  /* DOCX */
  const doc = new docx.Document({
    sections: [{
      children: [
        new docx.Paragraph("STUDENT TUITION STATEMENT"),
        new docx.Paragraph(`Academic Year: ${year}`),
        new docx.Paragraph(`Student Name: ${studentName}`),
        new docx.Paragraph(`Student ID: ${studentId}`),
        new docx.Paragraph(""),
        ...rows.map(r => new docx.Paragraph(r)),
        new docx.Paragraph(""),
        new docx.Paragraph(`Total Tuition: ${finalAmount}`),
        new docx.Paragraph(""),
        new docx.Paragraph("Parent Signature: _______________________"),
        new docx.Paragraph("Accountant Signature: ____________________")
      ]
    }]
  });

  const blob = await docx.Packer.toBlob(doc);
  saveAs(blob, `AY26-${studentName}-${studentId}.docx`);

  /* PDF */
  const pdf = new jsPDF();
  let y = 20;

  pdf.setFontSize(14);
  pdf.text("STUDENT TUITION STATEMENT", 20, y); y += 10;

  pdf.setFontSize(11);
  pdf.text(`Academic Year: ${year}`, 20, y); y+=7;
  pdf.text(`Student Name: ${studentName}`, 20, y); y+=7;
  pdf.text(`Student ID: ${studentId}`, 20, y); y+=10;

  rows.forEach(r => {
    pdf.text(r, 20, y);
    y+=7;
  });

  y+=5;
  pdf.text(`Total: ${finalAmount}`, 20, y); y+=20;

  pdf.text("Parent Signature: ____________________", 20, y); y+=15;
  pdf.text("Accountant Signature: ________________", 20, y);

  pdf.save(`AY26-${studentName}-${studentId}.pdf`);

  /* PRINT */
  const printWindow = window.open("", "_blank");
  printWindow.document.write(`
    <html>
    <body style="font-family:Arial;padding:40px;">
      <img src="${document.getElementById("logoImg").src}" style="max-width:150px;"><br><br>
      <h2>Student Tuition Statement</h2>
      <p><b>Academic Year:</b> ${year}</p>
      <p><b>Student Name:</b> ${studentName}</p>
      <p><b>Student ID:</b> ${studentId}</p>
      ${rows.map(r => `<p>${r}</p>`).join("")}
      <h3>Total: ${finalAmount}</h3>

      <br><br>
      <p>Parent Signature: ______________________</p>
      <p>Accountant Signature: __________________</p>
    </body>
    </html>
  `);
  printWindow.document.close();
  printWindow.print();
}

/* INIT */
addDiscount();
recalc();

</script>

</body>
</html>
