<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Student Enrollment & Tuition Plan System</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- DOCX LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
/* (UNCHANGED CSS — kept exactly same) */
</style>

</head>

<body>
<div class="container" id="containerRoot">
  <h1>Student Enrollment &amp; Tuition Plan</h1>

  <h2>1. Enrollment</h2>

  <div class="enroll-table">
    <table>
      <tbody>

        <!-- ROW 1 -->
        <tr>
          <td width="50%">
            <div class="cell">
              <div class="t">Academic Year</div>
              <div class="v">
                <select id="academicYear">
                  <option value="AY2025-2026">AY2025–2026</option>
                  <option value="SUMMER2026">Summer 2026</option>
                  <option value="AY2026-2027" selected>AY2026–2027</option>
                </select>
              </div>
            </div>
          </td>

          <td width="50%">
            <div class="cell">
              <div class="t">Grade Level</div>
              <div class="v">
                <select id="grade">
                  <option value="SR Full-day">SR Full-day</option>
                  <option value="EY1" selected>EY1</option>
                  <option value="EY2">EY2</option>
                  <option value="Y1">Y1</option>
                  <option value="Y2">Y2</option>
                  <option value="Y3">Y3</option>
                </select>
              </div>
            </div>
          </td>
        </tr>

        <!-- REMOVED Student Type & Father -->

        <!-- UPDATED ROW -->
        <tr>
          <td>
            <div class="cell">
              <div class="t">Student ID</div>
              <div class="v">
                <input type="text" id="studentId" placeholder="Enter ID">
              </div>
            </div>
          </td>

          <td>
            <div class="cell">
              <div class="t">Student Name</div>
              <div class="v">
                <input type="text" id="studentName" placeholder="Enter name">
              </div>
            </div>
          </td>
        </tr>

        <!-- REST UNCHANGED -->
        <tr>
          <td>
            <div class="cell">
              <div class="t">Payment Plan</div>
              <div class="v">
                <select id="paymentPlan">
                  <option value="One-Time">One-Time</option>
                  <option value="Termly" selected>Termly</option>
                  <option value="Monthly">Monthly</option>
                </select>
              </div>
            </div>
          </td>

          <td>
            <div class="cell">
              <div class="t">First Attendance Date</div>
              <div class="v">
                <input type="date" id="firstAttendance">
              </div>
            </div>
          </td>
        </tr>

        <tr id="calcDateRow">
          <td></td>
          <td>
            <div class="cell">
              <div class="t">First Calculation Date</div>
              <div class="v">
                <input type="date" id="firstCalcDate">
              </div>
            </div>
          </td>
        </tr>

      </tbody>
    </table>
  </div>

  <!-- KEEP ALL ORIGINAL SECTIONS (UNCHANGED) -->

  <h2>2. Calculating Payment</h2>
  <div class="fee-summary" id="feeSummary"></div>

  <h2>3. Tuition Payment Plan</h2>
  <div class="plan">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Due Date</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="planBody"></tbody>
    </table>
  </div>

  <!-- UPDATED BUTTONS -->
  <div class="action-row">
    <button class="btn-cancel" onclick="clearForm()">[Clear]</button>
    <button class="btn-final" onclick="saveAndPrint()">[Save and Print]</button>
  </div>

</div>

<script>

/* KEEP ALL ORIGINAL JS ABOVE (unchanged) */


/* =========================================
   CLEAR FUNCTION (NEW)
========================================= */
function clearForm() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  document.querySelectorAll("select").forEach(s => s.selectedIndex = 0);

  document.getElementById("academicYear").value = "AY2026-2027";
  document.getElementById("grade").value = "EY1";
  document.getElementById("paymentPlan").value = "Termly";

  discounts = [];
  renderDiscounts();
  recalc();
}


/* =========================================
   SAVE + PRINT (NEW)
========================================= */
async function saveAndPrint() {

  const studentName = document.getElementById("studentName").value || "Student";
  const studentId   = document.getElementById("studentId").value || "ID";
  const year        = document.getElementById("academicYear").value;

  const finalAmount = document.getElementById("finalTuitionDisplay").textContent;

  const rows = Array.from(document.querySelectorAll("#planBody tr"))
    .filter(r => !r.classList.contains("total-row"))
    .map(r => {
      const cols = r.querySelectorAll("td");
      return `${cols[0].innerText}. ${cols[1].childNodes[0].nodeValue.trim()} — ${cols[2].innerText}`;
    });

  const doc = new docx.Document({
    sections: [{
      children: [

        new docx.Paragraph({
          text: "STUDENT TUITION STATEMENT",
          heading: docx.HeadingLevel.HEADING_1
        }),

        new docx.Paragraph(""),
        new docx.Paragraph(`Academic Year: ${year}`),
        new docx.Paragraph(`Student Name: ${studentName}`),
        new docx.Paragraph(`Student ID: ${studentId}`),

        new docx.Paragraph(""),
        new docx.Paragraph("Tuition Payment Schedule:"),

        ...rows.map(r => new docx.Paragraph(r)),

        new docx.Paragraph(""),
        new docx.Paragraph({
          text: `Total Tuition: ${finalAmount}`,
          bold: true
        })
      ]
    }]
  });

  const blob = await docx.Packer.toBlob(doc);
  saveAs(blob, `AY26-${studentName}-${studentId}.docx`);

  // PRINT CLEAN VIEW
  const printWindow = window.open("", "_blank");
  printWindow.document.write(`
    <html>
    <head><title>Print</title></head>
    <body style="font-family:Arial;padding:40px;">
      <h2>Student Tuition Statement</h2>
      <p><b>Academic Year:</b> ${year}</p>
      <p><b>Student Name:</b> ${studentName}</p>
      <p><b>Student ID:</b> ${studentId}</p>

      <h3>Payment Plan</h3>
      ${rows.map(r => `<p>${r}</p>`).join("")}

      <h3>Total: ${finalAmount}</h3>
    </body>
    </html>
  `);
  printWindow.document.close();
  printWindow.print();
}


/* INIT */
addDiscount();
recalc();

</script>

</body>
</html>
