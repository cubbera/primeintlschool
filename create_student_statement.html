<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Student Enrollment & Tuition Plan System</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
/* KEEP ALL ORIGINAL STYLES EXACTLY */
</style>
</head>

<body>
<div class="container" id="containerRoot">
  <h1>Student Enrollment &amp; Tuition Plan</h1>

  <h2>1. Enrollment</h2>

  <div class="enroll-table">
    <table>
      <tbody>

        <tr>
          <td width="50%">
            <div class="cell">
              <div class="t">Academic Year</div>
              <div class="v">
                <select id="academicYear">
                  <option value="AY2025-2026">AY2025–2026</option>
                  <option value="SUMMER2026">Summer 2026</option>
                  <option value="AY2026-2027" selected>AY2026–2027</option>
                </select>
              </div>
            </div>
          </td>
          <td width="50%">
            <div class="cell">
              <div class="t">Grade Level</div>
              <div class="v">
                <select id="grade">
                  <option value="SR Full-day">SR Full-day</option>
                  <option value="EY1" selected>EY1</option>
                  <option value="EY2">EY2</option>
                  <option value="Y1">Y1</option>
                  <option value="Y2">Y2</option>
                  <option value="Y3">Y3</option>
                </select>
              </div>
            </div>
          </td>
        </tr>

        <!-- UPDATED ROW -->
        <tr>
          <td>
            <div class="cell">
              <div class="t">Student ID</div>
              <div class="v">
                <input type="text" id="studentId" placeholder="Enter Student ID">
              </div>
            </div>
          </td>
          <td>
            <div class="cell">
              <div class="t">Student Name</div>
              <div class="v">
                <input type="text" id="studentName" placeholder="Enter name">
              </div>
            </div>
          </td>
        </tr>

        <tr>
          <td>
            <div class="cell">
              <div class="t">Payment Plan</div>
              <div class="v">
                <select id="paymentPlan">
                  <option value="One-Time">One-Time</option>
                  <option value="Termly" selected>Termly</option>
                  <option value="Monthly">Monthly</option>
                </select>
              </div>
            </div>
          </td>
          <td>
            <div class="cell">
              <div class="t">First Attendance Date</div>
              <div class="v">
                <input type="date" id="firstAttendance">
              </div>
            </div>
          </td>
        </tr>

        <tr id="calcDateRow">
          <td></td>
          <td>
            <div class="cell">
              <div class="t">First Calculation Date</div>
              <div class="v">
                <input type="date" id="firstCalcDate">
              </div>
            </div>
          </td>
        </tr>

      </tbody>
    </table>
  </div>

  <!-- KEEP ALL OTHER SECTIONS EXACTLY UNCHANGED -->

  <div class="action-row">
    <button class="btn-cancel" type="button" onclick="clearForm()">[Clear]</button>
    <button class="btn-final" type="button" onclick="saveAndPrint()">[Save and Print]</button>
  </div>

</div>

<script>

/* KEEP ALL ORIGINAL JS EXACTLY */

/* =========================
   CLEAR FUNCTION (UPDATED)
   ========================= */
function clearForm() {
  location.reload();
}

/* =========================
   SAVE + PRINT PDF
   ========================= */
function saveAndPrint() {

  const name = document.getElementById("studentName").value || "Student";
  const id   = document.getElementById("studentId").value || "000";

  const fileName = `AY26-${name}-${id}.pdf`;

  const planRows = document.querySelectorAll("#planBody tr");

  let planHTML = "";
  planRows.forEach(row => {
    const cols = row.querySelectorAll("td");
    if(cols.length === 3){
      const due = cols[1].childNodes[0].textContent.trim(); // removes calculation
      planHTML += `
        <tr>
          <td>${cols[0].innerText}</td>
          <td>${due}</td>
          <td>${cols[2].innerText}</td>
        </tr>`;
    }
  });

  const finalAmount = document.getElementById("finalTuitionDisplay").innerText;

  const pdfContent = `
    <div style="font-family:Arial;padding:30px;">
      <h2 style="text-align:center;">STUDENT TUITION STATEMENT</h2>

      <p><b>Academic Year:</b> ${document.getElementById("academicYear").value}</p>
      <p><b>Student Name:</b> ${name}</p>
      <p><b>Student ID:</b> ${id}</p>
      <p><b>Grade:</b> ${document.getElementById("grade").value}</p>

      <h3>Payment Plan</h3>
      <table border="1" cellspacing="0" cellpadding="8" width="100%">
        <tr><th>No</th><th>Due Date</th><th>Amount</th></tr>
        ${planHTML}
      </table>

      <h3 style="text-align:right;">Total: ${finalAmount} ks</h3>

      <br><br>

      <div style="margin-top:60px;">
        <div style="display:flex; justify-content:space-between;">
          <div>
            ___________________________<br>
            Parent Name & Signature
          </div>

          <div>
            ___________________________<br>
            Account Name & Signature
          </div>
        </div>
      </div>
    </div>
  `;

  const opt = {
    margin: 0.5,
    filename: fileName,
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(pdfContent).save().then(() => {
    window.print();
  });
}

</script>

</body>
</html>
